name: RSS Monitor

# 触发条件
on:
  # 定时任务：每小时执行一次（Cron表达式：UTC时间）
  schedule:
    - cron: '0 * * * *'

  # 手动触发：支持在GitHub网页上手动运行
  workflow_dispatch:

  # 可选：当主分支有更新时自动触发（用于测试）
  push:
    branches: [ main, master ]

# 环境变量
env:
  RSS_URL: "https://cn.investing.com/rss/news_285.rss"
  RECIPIENT_EMAIL: "529654431@qq.com"
  PYTHON_VERSION: "3.11"

# 任务定义
jobs:
  monitor:
    name: RSS监控任务
    runs-on: ubuntu-latest

    steps:
      # 步骤1：检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤2：设置Python环境
      - name: 设置Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      # 步骤3：安装依赖
      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 步骤4：显示执行信息
      - name: 显示执行信息
        run: |
          echo "========================================"
          echo "RSS监控任务开始执行"
          echo "========================================"
          echo "执行时间: $(date)"
          echo "RSS源: ${{ env.RSS_URL }}"
          echo "收件人: ${{ env.RECIPIENT_EMAIL }}"
          echo "========================================"

      # 步骤5：执行RSS监控
      - name: 执行RSS监控工作流
        run: |
          python src/main.py -m flow -i "{
            \"rss_url\": \"${{ env.RSS_URL }}\",
            \"recipient_email\": \"${{ env.RECIPIENT_EMAIL }}\"
          }"

      # 步骤6：上传日志（如果执行失败）
      - name: 上传工作流日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-logs-${{ github.run_number }}
          path: |
            /app/work/logs/bypass/
            logs/
          retention-days: 7

      # 步骤7：执行完成通知
      - name: 显示执行结果
        if: always()
        run: |
          echo "========================================"
          echo "RSS监控任务执行完成"
          echo "========================================"
          echo "执行时间: $(date)"
          echo "运行ID: ${{ github.run_number }}"
          echo "触发方式: ${{ github.event_name }}"
          echo "========================================"
